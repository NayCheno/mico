    expected_features: [width_adapter, renamed_interfaces]
    expected:
      compose_pass: true
      lint_pass: true
      diagnostics: []
  - id: T042_width_adapter_cross_domain
    level: L2
    type: negative
    path: tasks/T042_width_adapter_cross_domain
    request: Reject a width adapter that attempts to cross from Aclk to Bclk.
    module_inventory: [Source32, Sink64]
    interface_inventory: [StreamU32A, StreamU64B]
    adapter_inventory: [Widen32To64]
