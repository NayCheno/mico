name: ModuleComposeBench
version: 0.1.0
purpose: Evaluate LLM-assisted RTL module composition with typed interfaces, contracts, adapters, and clock-domain checks.
levels:
  L1: same-domain direct interface connections
  L2: width and parameter adaptation
  L3: backpressure and latency adapters
  L4: CDC/RDC adapters
  L5: bus bridge/register wrappers
  L6: multi-IP subsystem integration
tasks:
  - id: T001_stream_fifo
    level: L1
    type: positive
    path: tasks/T001_stream_fifo
    mico_source: rust_project/examples/stream_fifo.mico
    rtl_collateral: rtl/examples/mico_example_leafs.sv
    expected_features: [direct_connect, ready_valid]
    expected:
      compose_pass: true
      lint_pass: true
  - id: T002_cdc_fifo
    level: L4
    type: positive
    path: tasks/T002_cdc_fifo
    mico_source: rust_project/examples/cdc_fifo.mico
    rtl_collateral: rtl/examples/mico_example_leafs.sv
    expected_features: [clock_domain_mismatch, explicit_cdc_adapter]
    expected:
      compose_pass: true
      lint_pass: true
  - id: T003_width_adapter
    level: L2
    type: positive
    path: tasks/T003_width_adapter
    mico_source: rust_project/examples/width_adapter.mico
    rtl_collateral: rtl/examples/mico_example_leafs.sv
    expected_features: [width_mismatch, explicit_width_adapter]
    expected:
      compose_pass: true
      lint_pass: true
  - id: T004_direct_stream
    level: L1
    type: positive
    path: tasks/T004_direct_stream
    mico_source: benchmarks/tasks/T004_direct_stream/expected.mico
    rtl_collateral: rtl/examples/mico_example_leafs.sv
    expected_features: [direct_connect, ready_valid]
    expected:
      compose_pass: true
      lint_pass: true
  - id: T005_invalid_width_no_adapter
    level: L2
    type: negative
    path: tasks/T005_invalid_width_no_adapter
    mico_source: rust_project/examples/invalid_width.mico
    rtl_collateral: rtl/examples/mico_example_leafs.sv
    expected_features: [unsafe_width_without_adapter, compiler_rejection]
    expected:
      compose_pass: false
      lint_pass: false
      diagnostics: [InterfaceMismatch]
  - id: T006_direct_cdc_without_adapter
    level: L4
    type: negative
    path: tasks/T006_direct_cdc_without_adapter
    mico_source: benchmarks/tasks/T006_direct_cdc_without_adapter/invalid.mico
    rtl_collateral: rtl/examples/mico_example_leafs.sv
    expected_features: [unsafe_cdc_without_adapter, compiler_rejection]
    expected:
      compose_pass: false
      lint_pass: false
      diagnostics: [InterfaceMismatch, ClockDomainMismatch]
  - id: T007_reversed_direction
    level: L1
    type: negative
    path: tasks/T007_reversed_direction
    mico_source: benchmarks/tasks/T007_reversed_direction/invalid.mico
    rtl_collateral: rtl/examples/mico_example_leafs.sv
    expected_features: [direction_mismatch, compiler_rejection]
    expected:
      compose_pass: false
      lint_pass: false
      diagnostics: [DirectionMismatch]
seed_tasks:
  - id: T001_stream_fifo
  - id: T002_cdc_fifo
  - id: T003_width_adapter
metrics:
  - Compose-Pass@1
  - Repair-Turns
  - Lint-Pass
  - Sim-Pass
  - Formal-Pass
  - Unsafe-Rejection
  - QoR-Delta
  - Connection-Entropy-Reduction
