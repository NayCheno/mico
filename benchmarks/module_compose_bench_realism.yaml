    sim_testbench: benchmarks/sim/tb_direct_stream_alt_names.sv
    sim_top: tb_direct_stream_alt_names
    formal_harness: benchmarks/formal/tb_direct_stream_alt_names_formal.sv
    formal_top: Top
    formal_depth: 4
    expected_features: [direct_connect, renamed_instances, calibration]
