name: ModuleComposeBenchRealismSupplement
version: 0.2.0
minimum_tasks: 30
purpose: Supplemental deterministic subsystem realism cases for DAC 2027 evaluation hardening without changing the locked LLM-scored public or held-out manifests.
scope_notes:
  - This supplement adds deterministic subsystem realism cases, paired unsafe variants, and balanced L1-L6 calibration tasks reused from committed collateral so the runner's per-level invariant remains active.
  - It is deterministic-only until an authenticated LLM rerun explicitly includes it.
  - The cases cover DMA register-map/status composition, AXI-stream-like packetization, and memory-mapped control/data width adaptation.
  - Each positive case has committed MICO source, JSON AST fixture, RTL collateral, directed simulation, and directed single-clock formal monitors.
  - QoR and Vivado evidence remain governed by the main public and held-out QoR-enabled manifests.
levels:
  L1: same-domain direct interface connections
  L2: width and parameter adaptation
  L3: backpressure and latency adapter seeds
  L4: CDC/RDC adapter and rejection seeds
  L5: bus bridge/register wrapper seeds
  L6: multi-IP subsystem integration seeds
split_policy:
  public_dev:
    description: Supplemental public-development realism extension; not used for the locked v3 LLM matrix unless rerun.
    task_selector: T077-T084 plus deterministic calibration rows
  held_out:
    status: not_applicable
    description: This supplement is not a held-out scoring split.
    release_policy: Archive with deterministic supplemental evidence only; do not mix with held-out LLM claims.
  prompt_leakage_controls:
    - Prompt builders must not use expected compose bodies, diagnostics, testbenches, or formal monitors as few-shot examples.
    - LLM claims must report this supplement separately unless a new authenticated matrix reruns it.
tasks:
