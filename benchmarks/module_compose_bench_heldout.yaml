name: ModuleComposeBenchHeldOut
version: 0.1.0
minimum_tasks: 12
purpose: Held-out scoring manifest for DAC 2027 prompt and case-study validation.
scope_notes:
  - This manifest is not used for prompt iteration; final LLM claims must report it separately from the public development manifest.
  - It adds three dedicated held-out subsystem cases, bringing the committed case-study corpus from 5 public-dev cases to 8 total cases.
  - The held-out cases cover AXI/APB wrapper composition, video-style pipeline composition, and explicit CDC event/status composition.
  - T063--T065 have committed MICO source, RTL collateral, directed simulation, QoR references, and paired negative variants T066--T068.
  - CDC correctness remains out of scope; the CDC case uses smoke FIFO collateral and may only be claimed as explicit-adapter gating plus smoke validation.
levels:
  L1: same-domain direct interface connections
  L2: width and parameter adaptation
  L3: backpressure and latency adapter seeds
  L4: CDC/RDC adapter and rejection seeds
  L5: bus bridge/register wrapper seeds
  L6: multi-IP subsystem integration seeds
split_policy:
  public_dev:
    description: No tasks in this manifest are used for prompt debugging or few-shot prompt iteration.
    task_selector: none
  held_out:
    status: committed_held_out
    description: T063--T068 are dedicated held-out scoring cases; the remaining seed tasks provide fixed per-level calibration coverage for the runner.
    release_policy: Archive sanitized held-out prompts, result JSON, aggregate hashes, and this manifest hash as release assets after scoring.
  prompt_leakage_controls:
    - Prompt builders must strip expected compose bodies from MICO sources for held-out scoring.
    - Held-out expected sources, diagnostics, testbenches, and QoR references must not be used as few-shot examples.
    - Result records include the manifest path and manifest SHA-256 to bind scores to this held-out split.
tasks:
  - id: T013_direct_stream_alt_names
    level: L1
    type: positive
    path: tasks/T013_direct_stream_alt_names
    request: Connect Producer.tx to Consumer.rx using renamed instances and a Packet32 ready-valid interface.
    module_inventory: [Producer, Consumer]
    interface_inventory: [Packet32]
    adapter_inventory: []
    mico_source: benchmarks/tasks/T013_direct_stream_alt_names/expected.mico
    rtl_collateral: rtl/examples/mico_example_leafs.sv
    expected_features: [direct_connect, renamed_instances]
    expected:
      compose_pass: true
      lint_pass: true
      diagnostics: []
  - id: T007_reversed_direction
    level: L1
    type: negative
    path: tasks/T007_reversed_direction
    request: Reject a reversed connection that drives Producer.tx from Consumer.rx.
    module_inventory: [Producer, Consumer]
    interface_inventory: [StreamU32]
    adapter_inventory: []
    mico_source: benchmarks/tasks/T007_reversed_direction/invalid.mico
    rtl_collateral: rtl/examples/mico_example_leafs.sv
    expected_features: [direction_mismatch, compiler_rejection]
    expected:
      compose_pass: false
      lint_pass: false
      diagnostics: [DirectionMismatch]
  - id: T021_width_alt_interfaces
    level: L2
    type: positive
    path: tasks/T021_width_alt_interfaces
    request: Widen Source32.tx from NarrowStream to Sink64.rx on WideStream with Widen32To64.
    module_inventory: [Source32, Sink64]
    interface_inventory: [NarrowStream, WideStream]
    adapter_inventory: [Widen32To64]
