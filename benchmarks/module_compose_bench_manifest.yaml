name: ModuleComposeBench
version: 0.1.0
purpose: Evaluate LLM-assisted RTL module composition with typed interfaces, contracts, adapters, and clock-domain checks.
levels:
  L1: same-domain direct interface connections
  L2: width and parameter adaptation
  L3: backpressure and latency adapters
  L4: CDC/RDC adapters
  L5: bus bridge/register wrappers
  L6: multi-IP subsystem integration
seed_tasks:
  - id: T001_stream_fifo
    level: L1
    path: tasks/T001_stream_fifo
    expected_features: [direct_connect, ready_valid]
  - id: T002_cdc_fifo
    level: L4
    path: tasks/T002_cdc_fifo
    expected_features: [clock_domain_mismatch, explicit_cdc_adapter]
  - id: T003_width_adapter
    level: L2
    path: tasks/T003_width_adapter
    expected_features: [width_mismatch, explicit_width_adapter]
metrics:
  - Compose-Pass@1
  - Repair-Turns
  - Lint-Pass
  - Sim-Pass
  - Formal-Pass
  - Unsafe-Rejection
  - QoR-Delta
  - Connection-Entropy-Reduction
