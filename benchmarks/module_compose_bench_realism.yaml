name: ModuleComposeBenchRealismSupplement
version: 0.1.0
minimum_tasks: 6
purpose: Supplemental deterministic subsystem realism cases for DAC 2027 evaluation hardening without changing the locked LLM-scored public or held-out manifests.
scope_notes:
  - This supplement adds three positive subsystem cases and three paired unsafe variants, plus L1-L4 calibration tasks reused from existing manifests so the runner's per-level invariant remains active.
  - It is deterministic-only until an authenticated LLM rerun explicitly includes it.
  - The cases cover DMA register-map/status composition, AXI-stream-like packetization, and memory-mapped control/data width adaptation.
  - Each positive case has committed MICO source, JSON AST fixture, RTL collateral, directed simulation, and directed single-clock formal monitors.
  - QoR and Vivado evidence remain governed by the main public and held-out QoR-enabled manifests.
levels:
  L1: same-domain direct interface connections
  L2: width and parameter adaptation
  L3: backpressure and latency adapter seeds
  L4: CDC/RDC adapter and rejection seeds
  L5: bus bridge/register wrapper seeds
  L6: multi-IP subsystem integration seeds
split_policy:
  public_dev:
    description: Supplemental public-development realism extension; not used for the locked v3 LLM matrix unless rerun.
    task_selector: T077-T082
  held_out:
    status: not_applicable
    description: This supplement is not a held-out scoring split.
    release_policy: Archive with deterministic supplemental evidence only; do not mix with held-out LLM claims.
  prompt_leakage_controls:
    - Prompt builders must not use expected compose bodies, diagnostics, testbenches, or formal monitors as few-shot examples.
    - LLM claims must report this supplement separately unless a new authenticated matrix reruns it.
tasks:
  - id: T013_direct_stream_alt_names
    level: L1
    type: positive
    path: tasks/T013_direct_stream_alt_names
    request: Connect Producer.tx to Consumer.rx using renamed instances and a Packet32 ready-valid interface.
    module_inventory: [Producer, Consumer]
    interface_inventory: [Packet32]
    adapter_inventory: []
    mico_source: benchmarks/tasks/T013_direct_stream_alt_names/expected.mico
    rtl_collateral: rtl/examples/mico_example_leafs.sv
    sim_testbench: benchmarks/sim/tb_direct_stream_alt_names.sv
    sim_top: tb_direct_stream_alt_names
    formal_harness: benchmarks/formal/tb_direct_stream_alt_names_formal.sv
    formal_top: Top
    formal_depth: 4
    expected_features: [direct_connect, renamed_instances, calibration]
    expected:
      compose_pass: true
      lint_pass: true
      sim_pass: true
      formal_pass: true
      diagnostics: []
  - id: T007_reversed_direction
    level: L1
    type: negative
    path: tasks/T007_reversed_direction
    request: Reject a reversed connection that drives Producer.tx from Consumer.rx.
    module_inventory: [Producer, Consumer]
    interface_inventory: [StreamU32]
    adapter_inventory: []
    mico_source: benchmarks/tasks/T007_reversed_direction/invalid.mico
    rtl_collateral: rtl/examples/mico_example_leafs.sv
    expected_features: [direction_mismatch, compiler_rejection, calibration]
    expected:
      compose_pass: false
      lint_pass: false
      diagnostics: [DirectionMismatch]
  - id: T021_width_alt_interfaces
    level: L2
    type: positive
    path: tasks/T021_width_alt_interfaces
    request: Widen Source32.tx from NarrowStream to Sink64.rx on WideStream with Widen32To64.
    module_inventory: [Source32, Sink64]
    interface_inventory: [NarrowStream, WideStream]
    adapter_inventory: [Widen32To64]
    mico_source: benchmarks/tasks/T021_width_alt_interfaces/expected.mico
    rtl_collateral: rtl/examples/mico_example_leafs.sv
    sim_testbench: benchmarks/sim/tb_width_alt_interfaces.sv
    sim_top: tb_width_alt_interfaces
    formal_harness: benchmarks/formal/tb_width_alt_interfaces_formal.sv
    formal_top: Top
    formal_depth: 4
    expected_features: [width_adapter, renamed_interfaces, calibration]
    expected:
      compose_pass: true
      lint_pass: true
      sim_pass: true
      formal_pass: true
      diagnostics: []
  - id: T042_width_adapter_cross_domain
