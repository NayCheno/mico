name: ModuleComposeBench
version: 0.3.0
minimum_tasks: 50
purpose: Evaluate LLM-assisted RTL module composition with typed interfaces, contracts, adapters, and clock-domain checks.
scope_notes:
  - The deterministic compiler baseline covers 57 hand-written seed tasks plus 5 dedicated subsystem case studies.
  - L1/L2/L4 tasks use committed smoke RTL collateral for lint/elaboration.
  - L3/L5/L6 include seed approximations plus dedicated streaming, width-bridge, register/status, protocol-bridge, and telemetry case-study RTL.
  - Simulation and single-clock formal denominators include committed and generated smoke harnesses; QoR includes tasks with committed reference wrappers.
  - CDC formal correctness remains out of scope for this manifest revision.
levels:
  L1: same-domain direct interface connections
  L2: width and parameter adaptation
  L3: backpressure and latency adapter seeds
  L4: CDC/RDC adapter and rejection seeds
  L5: bus bridge/register wrapper seeds
  L6: multi-IP subsystem integration seeds
split_policy:
  public_dev:
    description: All committed tasks in this manifest are public development tasks used for deterministic regression, documentation, and prompt debugging.
    task_selector: T001-T062
  held_out:
    status: external_not_committed
    description: Final LLM advantage claims require a separately versioned held-out task manifest that is not used for prompt iteration before scoring.
    release_policy: Archive sanitized held-out manifest, prompts, result JSON, and aggregate hashes as release assets after scoring; do not commit secrets or raw provider payloads.
  prompt_leakage_controls:
    - LLM prompts include the natural-language request, inventories, and interface/module declarations but strip compose bodies from committed expected MICO sources.
    - Expected solutions, diagnostics, testbenches, formal harnesses, and QoR references are committed for deterministic reproduction and are not inserted into benchmark prompts.
